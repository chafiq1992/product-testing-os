options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: europe-west1
  _REPO: pto-repo
  _API_SVC: pto-api
  _WORKER_SVC: pto-worker
  _FRONTEND_SVC: pto-frontend
steps:
- id: Build API
  name: gcr.io/cloud-builders/docker
  args: ["build","-t","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_API_SVC}:$SHORT_SHA","backend"]
- id: Build Worker
  name: gcr.io/cloud-builders/docker
  args: ["build","-f","backend/Dockerfile.worker","-t","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SVC}:$SHORT_SHA","."]
- id: Build Frontend
  name: gcr.io/cloud-builders/docker
  args: ["build","-t","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_FRONTEND_SVC}:$SHORT_SHA","frontend"]
- id: Push API
  name: gcr.io/cloud-builders/docker
  args: ["push","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_API_SVC}:$SHORT_SHA"]
- id: Push Worker
  name: gcr.io/cloud-builders/docker
  args: ["push","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SVC}:$SHORT_SHA"]
- id: Push Frontend
  name: gcr.io/cloud-builders/docker
  args: ["push","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_FRONTEND_SVC}:$SHORT_SHA"]
- id: Deploy API
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
    ["run","deploy","${_API_SVC}","--image","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_API_SVC}:$SHORT_SHA","--region","${_REGION}","--allow-unauthenticated","--port","8000",
     "--set-env-vars","SHOPIFY_SHOP_DOMAIN=${_SHOPIFY_SHOP_DOMAIN},SHOPIFY_API_VERSION=2025-07,META_AD_ACCOUNT_ID=${_META_AD_ACCOUNT_ID},META_PAGE_ID=${_META_PAGE_ID},META_API_VERSION=v23.0,CELERY_BROKER_URL=${_CELERY_URL},CELERY_RESULT_BACKEND=${_CELERY_URL}",
     "--set-secrets","OPENAI_API_KEY=OPENAI_API_KEY:latest,SHOPIFY_ACCESS_TOKEN=SHOPIFY_ACCESS_TOKEN:latest,META_ACCESS_TOKEN=META_ACCESS_TOKEN:latest"]
- id: Deploy Worker
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
    ["run","deploy","${_WORKER_SVC}","--image","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SVC}:$SHORT_SHA","--region","${_REGION}","--no-allow-unauthenticated","--port","8080","--cpu","1","--memory","1Gi","--min-instances","1",
     "--set-env-vars","SHOPIFY_SHOP_DOMAIN=${_SHOPIFY_SHOP_DOMAIN},SHOPIFY_API_VERSION=2025-07,META_AD_ACCOUNT_ID=${_META_AD_ACCOUNT_ID},META_PAGE_ID=${_META_PAGE_ID},META_API_VERSION=v23.0,CELERY_BROKER_URL=${_CELERY_URL},CELERY_RESULT_BACKEND=${_CELERY_URL}",
     "--set-secrets","OPENAI_API_KEY=OPENAI_API_KEY:latest,SHOPIFY_ACCESS_TOKEN=SHOPIFY_ACCESS_TOKEN:latest,META_ACCESS_TOKEN=META_ACCESS_TOKEN:latest"]
- id: Deploy Frontend
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
    ["run","deploy","${_FRONTEND_SVC}","--image","${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_FRONTEND_SVC}:$SHORT_SHA","--region","${_REGION}","--allow-unauthenticated","--port","8080"]
images:
- ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_API_SVC}:$SHORT_SHA
- ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SVC}:$SHORT_SHA
- ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_FRONTEND_SVC}:$SHORT_SHA
